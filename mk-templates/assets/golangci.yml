version: "2"

run:
  # golangci-lint runtime timeout
  timeout: 5m
  go: "1.26"
  # see: https://golangci-lint.run/docs/configuration/file/
  modules-download-mode: vendor
  # include test files or not.
  tests: false

linters:
  # Enable specific linter (not part of default linters)
  # https://golangci-lint.run/docs/linters/
  enable:
    # revive as replacement for golint.
    - revive
    # whitespace to identify unnecessary whitespaces.
    - whitespace
    # godot checks if all top-level comments contain a period at the end of the last sentence if needed.
    - godot
    # gocyclo calculates cyclomatic complexities of functions in Go source code.
    - gocyclo
    # gosec inspects source code for security problems by scanning the Go AST.
    - gosec
    # wrapcheck is a Go linter to check that errors from external packages are wrapped
    - wrapcheck
    # misspell checks for spelling mistakes
    - misspell
  # excluding configuration per-path, per-linter, per-text and per-source
  exclusions:
    generated: strict
    rules:
      - path: _test.go
        linters:
          - errcheck
  settings:
    # misspell settings
    misspell:
      locale: US
    # revive settings
    revive:
      severity: warning
      rules:
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unexported-return
        - name: unexported-return
          severity: warning
          disabled: true
    # gosec settings
    gosec:
      excludes:
        # exclude random number check
        - G404
    gocyclo:
      min-complexity: 15

formatters:
  enable:
    # gofumpt as replacement for gofmt.
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
